<!DOCTYPE html>
<html>
<head>
<title>Cloud Storage</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

/* GLASS EFFECT */
.container{
background:rgba(255,255,255,0.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:20px;
width:350px;
box-shadow:0 8px 32px rgba(0,0,0,0.3);
color:white;
}

h2{
text-align:center;
margin-bottom:15px;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:none;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:10px;
background:#ff9800;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

#otpBox{
display:none;
}
</style>
</head>

<body>

<div class="container">

<h2>☁ Cloud Storage</h2>

<!-- REGISTER -->
<h3>Register</h3>
<input id="ruser" placeholder="Username">
<input id="rpass" type="password" placeholder="Password">
<button onclick="register()">Create Account</button>

<h3>Login</h3>

<input id="luser" placeholder="Username">

<!-- PASSWORD LOGIN -->
<input id="lpass" type="password" placeholder="Password">
<button onclick="login()">Login with Password</button>

<hr>

<!-- OTP LOGIN -->
<button onclick="sendOTP()">Login with OTP</button>

<div id="otpBox">
<input id="otp" placeholder="Enter OTP">
<button onclick="verifyOTP()">Verify & Login</button>
</div>

</div>

<script>

let generatedOTP = ""

/* REGISTER */
function register(){

let u = document.getElementById("ruser").value.trim()
let p = document.getElementById("rpass").value.trim()

if(!u || !p){
alert("Enter username & password ❌")
return
}

let f = new FormData()
f.append("username", u)
f.append("password", p)

fetch("/register",{method:"POST",body:f})
.then(r=>r.json())
.then(d=>alert(d.message || d.error))

}

/* PASSWORD LOGIN */
function login(){

let user = document.getElementById("luser").value.trim()
let pass = document.getElementById("lpass").value.trim()

if(!user || !pass){
alert("Enter username & password ❌")
return
}

let f = new FormData()
f.append("username", user)
f.append("password", pass)

fetch("/login",{method:"POST",body:f})
.then(r=>r.json())
.then(d=>{

if(d.token){
localStorage.setItem("user", user)
localStorage.setItem("token", d.token)
window.location="/dashboard"
}else{
alert(d.error || "Login failed ❌")
}

})

}

/* SEND OTP */
function sendOTP(){

let u = document.getElementById("luser").value.trim()

if(!u){
alert("Enter username ❌")
return
}

generatedOTP = Math.floor(1000 + Math.random()*9000).toString()

alert("Your OTP: " + generatedOTP)

document.getElementById("otpBox").style.display="block"
document.getElementById("otp").value=""

}

/* VERIFY OTP */
function verifyOTP(){

let entered = document.getElementById("otp").value.trim()
let user = document.getElementById("luser").value.trim()

if(!entered){
alert("Enter OTP ❌")
return
}

if(entered !== generatedOTP){
alert("Wrong OTP ❌")
return
}

let f = new FormData()
f.append("username", user)

fetch("/login",{method:"POST",body:f})
.then(r=>r.json())
.then(d=>{

if(d.token){
localStorage.setItem("user", user)
localStorage.setItem("token", d.token)
window.location="/dashboard"
}else{
alert("Login failed ❌")
}

})

}

</script>

</body>
</html>
