<!DOCTYPE html>
<html>
<head>
<title>Chat</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
width:400px;
height:600px;
background:white;
border-radius:15px;
display:flex;
flex-direction:column;
overflow:hidden;
}

.header{
background:#667eea;
color:white;
padding:15px;
text-align:center;
font-size:18px;
}

.chat-box{
flex:1;
padding:10px;
overflow-y:auto;
background:#f1f1f1;
display:flex;
flex-direction:column;
}

.msg{
padding:8px 12px;
margin:5px;
border-radius:10px;
max-width:70%;
}

.left{
background:#fff;
align-self:flex-start;
}

.right{
background:#c8f7c5;
align-self:flex-end;
}

.input-box{
display:flex;
padding:10px;
gap:5px;
background:#eee;
}

.input-box input{
flex:1;
padding:10px;
border-radius:8px;
border:none;
}

.input-box button{
width:80px;   /* 🔥 fixed width */
background:#ff9800;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="header">💬 Chat</div>

<div id="box" class="chat-box"></div>

<div class="input-box">
<input id="user" placeholder="Send to user">
<input id="msg" placeholder="Type message">
<button onclick="send()">Send</button>
</div>

</div>

<script>

let user = localStorage.getItem("user")

function send(){

let r=document.getElementById("user").value
let m=document.getElementById("msg").value

if(!r || !m){
alert("Enter user & message")
return
}

let f=new FormData()

f.append("sender",user)
f.append("receiver",r)
f.append("text",m)

fetch("/send_message",{method:"POST",body:f})

document.getElementById("msg").value=""

}

function load(){

fetch(`/inbox?username=${user}`)
.then(r=>r.json())
.then(d=>{

let box=document.getElementById("box")
box.innerHTML=""

d.forEach(x=>{

let div=document.createElement("div")

div.classList.add("msg")

if(x.from===user){
div.classList.add("right")
}else{
div.classList.add("left")
}

div.innerText = x.from + ": " + x.text

box.appendChild(div)

})

box.scrollTop = box.scrollHeight

})

}

setInterval(load,2000)
load()

</script>

</body>
</html>
