<!DOCTYPE html>
<html>
<body>

<h2>Chat</h2>

<input id="user" placeholder="Send to user">
<input id="msg">
<button onclick="send()">Send</button>

<div id="box"></div>

<script>

let user = localStorage.getItem("user")

function send(){
let r=document.getElementById("user").value
let m=document.getElementById("msg").value

let f=new FormData()
f.append("sender",user)
f.append("receiver",r)
f.append("text",m)

fetch("/send_message",{method:"POST",body:f})
}

function load(){
fetch(`/inbox?username=${user}`)
.then(r=>r.json())
.then(d=>{
document.getElementById("box").innerHTML=
d.map(x=>`<p><b>${x.from}</b>: ${x.text}</p>`).join("")
})
}

setInterval(load,2000)

</script>

</body>
</html>
