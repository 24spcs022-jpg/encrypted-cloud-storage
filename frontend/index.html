<!DOCTYPE html>
<html>
<head>
<title>Cloud Storage</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.container{
background:white;
padding:30px;
border-radius:15px;
width:350px;
box-shadow:0 5px 20px rgba(0,0,0,0.2);
}

h2{
text-align:center;
margin-bottom:15px;
}

.section{
margin-bottom:20px;
}

.label{
font-weight:bold;
margin-top:10px;
}

input{
width:100%;
padding:10px;
margin:6px 0;
border-radius:8px;
border:1px solid #ccc;
outline:none;
}

/* BUTTON */
button{
width:100%;
padding:10px;
background:#667eea;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#5a67d8;
}

/* PASSWORD ROW */
.pass-box{
position:relative;
}

.eye{
position:absolute;
right:10px;
top:12px;
cursor:pointer;
}

/* STRENGTH */
.strength{
font-size:12px;
margin-top:2px;
}

.weak{color:red;}
.medium{color:orange;}
.strong{color:green;}

</style>
</head>

<body>

<div class="container">

<h2>☁ Cloud Storage</h2>

<!-- REGISTER -->
<div class="section">

<div class="label">Register</div>

<input id="ruser" placeholder="Username">

<div class="pass-box">
<input id="rpass" type="password" placeholder="Password" onkeyup="checkStrength()">
<span class="eye" onclick="togglePass('rpass')">👁</span>
</div>

<div id="strength" class="strength"></div>

<button onclick="register()">Create Account</button>

</div>

<!-- LOGIN -->
<div class="section">

<div class="label">Login</div>

<input id="luser" placeholder="Username">

<div class="pass-box">
<input id="lpass" type="password" placeholder="Password">
<span class="eye" onclick="togglePass('lpass')">👁</span>
</div>

<button onclick="login()">Login</button>

</div>

</div>

<script>

/* LOGIN */
function login(){

let u=document.getElementById("luser").value
let p=document.getElementById("lpass").value

let f=new FormData()
f.append("username",u)
f.append("password",p)

fetch("/login",{method:"POST",body:f})
.then(r=>r.json())
.then(d=>{
if(d.token){
localStorage.setItem("user",u)
localStorage.setItem("token",d.token)
window.location="/dashboard"
}else{
alert(d.error)
}
})
}

/* REGISTER */
function register(){

let u=document.getElementById("ruser").value
let p=document.getElementById("rpass").value

let f=new FormData()
f.append("username",u)
f.append("password",p)

fetch("/register",{method:"POST",body:f})
.then(r=>r.json())
.then(d=>{
alert(d.message || d.error)
})
}

/* SHOW / HIDE PASSWORD */
function togglePass(id){
let input=document.getElementById(id)
input.type = input.type==="password" ? "text" : "password"
}

/* PASSWORD STRENGTH */
function checkStrength(){

let p=document.getElementById("rpass").value
let s=document.getElementById("strength")

if(p.length<6){
s.innerHTML="Weak password"
s.className="strength weak"
}
else if(p.match(/[A-Z]/) && p.match(/\d/)){
s.innerHTML="Strong password"
s.className="strength strong"
}
else{
s.innerHTML="Medium password"
s.className="strength medium"
}
}

</script>

</body>
</html>
