<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/frontend/style.css">
</head>
<body>
<div class="box">
<h3>Register</h3>
<input id="ru" placeholder="Username">
<input id="rp" type="password" placeholder="Password">
<button onclick="register()">Register</button>

<h3>Login</h3>
<input id="lu" placeholder="Username">
<input id="lp" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
function register(){
 let f=new FormData();
 f.append("username",ru.value);
 f.append("password",rp.value);
 fetch("/register",{method:"POST",body:f})
 .then(r=>r.json()).then(d=>alert(d.message||d.error));
}
function login(){
 let f=new FormData();
 f.append("username",lu.value);
 f.append("password",lp.value);
 fetch("/login",{method:"POST",body:f})
 .then(r=>r.json()).then(d=>{
  localStorage.setItem("token",d.token);
  localStorage.setItem("user",lu.value);
  location.href="/dashboard";
 });
}
</script>
</body>
</html>
