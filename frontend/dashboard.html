<!DOCTYPE html>
<html>
<body>

<h2>Dashboard</h2>

<input type="file" id="file">
<button onclick="upload()">Upload</button>

<h3>Your Files</h3>
<div id="files"></div>

<button onclick="goChat()">💬 Chat</button>

<script>

function session(){
return{
user:localStorage.getItem("user"),
token:localStorage.getItem("token")
}
}

function upload(){
let s=session()
let f=new FormData()
f.append("username",s.user)
f.append("token",s.token)
f.append("file",document.getElementById("file").files[0])

fetch("/upload",{method:"POST",body:f})
.then(()=>load())
}

function load(){
let s=session()
fetch(`/my_files?username=${s.user}&token=${s.token}`)
.then(r=>r.json())
.then(d=>{
let div=document.getElementById("files")

div.innerHTML=d.map(x=>`
<div>
${x}
<button onclick="download('${x}')">⬇</button>
<button onclick="share('${x}')">📤</button>
</div>
`).join("")
})
}

function download(f){
let s=session()
location=`/download?username=${s.user}&token=${s.token}&filename=${f}`
}

function share(file){
let s=session()
let receiver=prompt("Enter username")
if(!receiver) return

let fd=new FormData()
fd.append("sender",s.user)
fd.append("receiver",receiver.trim())
fd.append("filename",file)

fetch("/share_file",{method:"POST",body:fd})
.then(r=>r.json())
.then(d=>{
alert(d.message || d.error)
})
}

function goChat(){
window.location="/chat"
}

setInterval(load,3000)
load()

</script>
</body>
</html>
