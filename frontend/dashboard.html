<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/frontend/style.css">
</head>
<body>

<div class="box">

<h2>Dashboard</h2>

<input type="file" id="file">

<button onclick="upload()">Upload</button>

<h3>Your Files</h3>

<div id="files"></div>

<br>

<button onclick="goChat()">💬 Chat</button>

<script>

function session(){

return{
user:localStorage.getItem("user"),
token:localStorage.getItem("token")
}

}

function upload(){

let s=session()

let f=new FormData()

f.append("username",s.user)
f.append("token",s.token)
f.append("file",document.getElementById("file").files[0])

fetch("/upload",{method:"POST",body:f})
.then(()=>load())

}

function load(){

let s=session()

fetch(`/my_files?username=${s.user}&token=${s.token}`)
.then(r=>r.json())
.then(d=>{

let div=document.getElementById("files")

div.innerHTML=d.map(x=>`
<div>
${x}
<button onclick="download('${x}')">⬇</button>
<button onclick="share('${x}')">📤</button>
</div>
`).join("")

})

}

function download(f){

let s=session()

location=`/download?username=${s.user}&token=${s.token}&filename=${f}`

}

function share(f){

let s=session()

let r=prompt("Receiver username")

let fd=new FormData()

fd.append("sender",s.user)
fd.append("receiver",r)
fd.append("token",s.token)
fd.append("filename",f)

fetch("/share_file",{method:"POST",body:fd})
.then(()=>alert("shared"))

}

function goChat(){
window.location="/chat"
}

load()

</script>

</body>

</html>
