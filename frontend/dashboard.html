<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/frontend/style.css">
</head>
<body>

<div class="box">

<h3>Upload Files</h3>

<select id="expiry">
<option value="24h">24 Hours</option>
<option value="7d">7 Days</option>
<option value="never">Never</option>
</select>

<br><br>

<input type="file" id="files" multiple>
<button onclick="upload()">Upload</button>

<h3>My Files</h3>
<div id="list"></div>

<br>
<button onclick="goChat()">💬 Open Chat</button>

</div>

<script>

let user = localStorage.getItem("user");
let token = localStorage.getItem("token");

/* Session check */
if(!user || !token){
    alert("Session expired. Please login again.");
    window.location = "/";
}

/* ================= UPLOAD ================= */

function upload(){

    let user = localStorage.getItem("user");
    let token = localStorage.getItem("token");

    if(!user || !token){
        alert("Session expired. Login again.");
        window.location="/";
        return;
    }

    const fs = document.getElementById("files").files;

    if(fs.length === 0){
        alert("Select files");
        return;
    }

    let f = new FormData();

    f.append("username", user);
    f.append("token", token);
    f.append("expiry", document.getElementById("expiry").value);

    for(let i=0;i<fs.length;i++){
        f.append("files", fs[i]);
    }

    fetch("/upload",{method:"POST",body:f})
    .then(r=>r.json())
    .then(d=>{

        if(d.error){
            alert("Error: " + d.error);
            return;
        }

       alert("File uploaded successfully");
        loadFiles();

    })
    .catch(()=>{
        alert("Upload failed");
    });

}


/* ================= LOAD FILES ================= */

function loadFiles(){

    let user = localStorage.getItem("user");
    let token = localStorage.getItem("token");

    fetch(`/my_files?username=${user}&token=${token}`)
    .then(r=>r.json())
    .then(d=>{

        let list = document.getElementById("list");

        if(!Array.isArray(d) || d.length===0){
            list.innerHTML = "No files uploaded";
            return;
        }

        list.innerHTML = d.map(x => `
        <div>
            ${x}
            <span>
                <button onclick="download('${x}')">⬇</button>
                <button onclick="share('${x}')">📤</button>
                <button onclick="del('${x}')">🗑</button>
            </span>
        </div>
        `).join("");

    })
    .catch(()=>{
        console.log("Failed to load files");
    });

}


/* ================= DOWNLOAD ================= */

function download(f){

    let user = localStorage.getItem("user");
    let token = localStorage.getItem("token");

    location.href=`/download?username=${user}&token=${token}&filename=${f}`;

}


/* ================= DELETE ================= */

function del(f){

    let user = localStorage.getItem("user");
    let token = localStorage.getItem("token");

    let fd = new FormData();

    fd.append("username",user);
    fd.append("token",token);
    fd.append("filename",f);

    fetch("/delete_file",{method:"POST",body:fd})
    .then(()=>loadFiles());

}

function share(file){

  let user = localStorage.getItem("user");
  let token = localStorage.getItem("token");

  let receiver = prompt("Enter username to share file:");

  if(!receiver) return;

  let fd = new FormData();

  fd.append("sender", user);
  fd.append("receiver", receiver);
  fd.append("token", token);
  fd.append("filename", file);

  fetch("/share_file",{method:"POST",body:fd})
  .then(r=>r.json())
  .then(d=>{
      if(d.error){
        alert(d.error);
      }else{
        alert("File shared successfully");
      }
  });

}

/* ================= CHAT ================= */

function goChat(){
    window.location="/chat";
}


/* Initial load */

loadFiles();
setInterval(loadFiles,5000);

</script>

</body>
</html>
